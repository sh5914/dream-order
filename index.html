<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロ野球 ドリームドラフトメーカー</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; background-color: #1a1a2e; color: #fff; margin: 0; }
        
        .landing-page { text-align: center; margin-top: 8vh; max-width: 800px; margin-left: auto; margin-right: auto; }
        .landing-page h1 { font-size: clamp(28px, 4vw, 48px); margin-bottom: 10px; word-break: keep-all; color: #e94560; }
        .landing-page .subtitle { font-size: 20px; color: #f1c40f; margin-bottom: 40px; font-weight: bold; }
        .rules-box { background: #162447; padding: 30px; border-radius: 10px; border: 2px solid #0f3460; text-align: left; margin-bottom: 40px; line-height: 1.8; }
        .rules-box h2 { color: #4ecc71; margin-top: 0; text-align: center; }
        
        .btn-container { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .start-btn { background: #e94560; color: white; border: none; padding: 20px 40px; font-size: 24px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4); flex: 1; min-width: 250px; max-width: 350px; }
        .start-btn:hover:not(:disabled) { background: #ff6b6b; transform: scale(1.05); }
        .start-btn:disabled { background: #555; cursor: not-allowed; box-shadow: none; color: #aaa; }
        
        .practice-btn { background: #2980b9; box-shadow: 0 4px 15px rgba(41, 128, 185, 0.4); }
        .practice-btn:hover:not(:disabled) { background: #3498db; }
        .practice-badge { background: #f39c12; color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 16px; margin-left: 10px; vertical-align: middle; display: none; font-weight: bold; }

        .container { display: flex; flex-direction: row; gap: 20px; max-width: 1200px; margin: 0 auto; justify-content: center; }
        #gameScreen h1 { text-align: center; color: #e94560; margin-bottom: 20px; font-size: clamp(24px, 3vw, 36px); word-break: keep-all; }
        
        .draft-zone { flex: 1; background: #162447; padding: 20px; border-radius: 10px; height: 80vh; overflow-y: auto; }
        .draft-header { text-align: center; background: #0f3460; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 2px solid #e94560; }
        .round-text { font-size: 24px; font-weight: bold; color: #fff; margin: 0; }
        .team-text { font-size: 32px; color: #f1c40f; margin: 10px 0; font-weight: bold; }
        
        .redraw-btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .redraw-btn:hover { background: #2980b9; }
        .redraw-btn:disabled { background: #555; cursor: not-allowed; color: #aaa; }
        
        /* ▼ 追加：やり直すボタンのスタイル ▼ */
        .reset-btn { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; display: none; }
        .reset-btn:hover { background: #c0392b; }

        .player-card { background: #1f4068; padding: 15px; margin-bottom: 12px; border-radius: 6px; display: flex; flex-direction: column; gap: 10px; border-left: 5px solid #e94560; }
        .player-info { line-height: 1.4; display: flex; justify-content: space-between; align-items: center; }
        
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .draft-btn { background: #e94560; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .draft-btn:hover { background: #ff6b6b; }
        .dh-btn { background: #9b59b6; } .dh-btn:hover { background: #8e44ad; }
        .no-slot { color: #ff6b6b; font-size: 14px; font-weight: bold; }

        .team-zone { width: 400px; background: #162447; border-radius: 10px; position: sticky; top: 20px; height: fit-content; }
        .capture-area { padding: 20px; background: #162447; border-radius: 10px; } 
        
        .position-slot { background: #0f3460; padding: 12px; margin-bottom: 10px; border-radius: 6px; display: flex; justify-content: space-between; border: 1px dashed #e94560; }
        .slot-title { font-weight: bold; color: #4ecc71; width: 80px; }
        .slot-player { flex: 1; text-align: right; color: #fff; }

        .result-zone { text-align: center; margin-top: 20px; padding: 15px; background: #0f3460; border-radius: 6px; display: none; }
        .result-btn { background: #4ecc71; color: white; border: none; padding: 12px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .result-btn:hover { background: #2ecc71; }
        .total-hr { font-size: 32px; color: #f1c40f; font-weight: bold; margin-top: 15px; margin-bottom: 15px;}
        
        .share-btn-group { display: flex; flex-direction: column; gap: 10px; }
        .action-btn { border: none; padding: 12px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; color: white; }
        .btn-save { background: #2ecc71; } .btn-save:hover { background: #27ae60; }
        .btn-copy { background: #f39c12; } .btn-copy:hover { background: #e67e22; }
        .btn-retry { background: #3498db; margin-top: 5px; } .btn-retry:hover { background: #2980b9; }

        @media screen and (max-width: 768px) {
            body { padding: 10px; }
            .container { flex-direction: column; align-items: center; }
            .draft-zone { width: 100%; box-sizing: border-box; height: 55vh; padding: 15px; }
            .team-zone { width: 100%; box-sizing: border-box; position: static; }
            .capture-area { padding: 15px; }
            .start-btn { width: 100%; padding: 15px; font-size: 20px; box-sizing: border-box; }
            .team-text { font-size: 28px; }
            .round-text { font-size: 20px; }
            .practice-badge { display: block; margin-top: 10px; margin-left: 0; width: fit-content; margin-inline: auto; }
        }
    </style>
</head>
<body>

    <div id="landingPage" class="landing-page">
        <h1>
            <span style="display: inline-block;">⚾ プロ野球</span>
            <span style="display: inline-block;">ドリームドラフトメーカー</span>
        </h1>
        <p class="subtitle">知識と運で、最強の打線を組み上げろ！</p>
        
        <div class="rules-box">
            <h2>【 ルール説明 】</h2>
            <ul>
                <li>ランダムに提示される「年度」と「球団」の中から、選手を1名指名します。（全9巡）</li>
                <li>DHを含む全9ポジションを埋めるとドラフト終了です。</li>
                <li><strong>選手のホームラン数は結果発表まで秘密！</strong> 打席数と記憶を頼りに指名してください。</li>
                <li>どうしても欲しい選手がいない場合は、1回だけ「引き直し」が可能です。</li>
            </ul>
        </div>

        <div class="btn-container">
            <button id="startGameBtn" class="start-btn" disabled>データを準備中...</button>
            <button id="startPracticeBtn" class="start-btn practice-btn" disabled>準備中...</button>
        </div>
    </div>

    <div id="gameScreen" style="display: none;">
        <h1>
            <span style="display: inline-block;">⚾ プロ野球</span>
            <span style="display: inline-block;">ドリームドラフトメーカー</span>
            <span id="practiceBadge" class="practice-badge">練習モード</span>
        </h1>
        <div class="container">
            <div class="draft-zone" id="draftZone">
                <div class="draft-header">
                    <p class="round-text" id="roundText">第 1 巡 選択希望選手</p>
                    <p class="team-text" id="randomTeamText">--年 --</p>
                    <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                        <button id="redrawBtn" class="redraw-btn" onclick="useRedraw()">パスして引き直す（残り1回）</button>
                        <button id="resetGameBtn" class="reset-btn">最初からやり直す</button>
                    </div>
                </div>
                <div id="playerList"></div>
            </div>

            <div class="team-zone">
                <div id="captureArea" class="capture-area">
                    <h2>【獲得選手一覧】</h2>
                    <div id="board"></div>

                    <div id="resultZone" class="result-zone">
                        <button id="resultBtn" class="result-btn">交渉権確定（結果発表）</button>
                        <div id="hrResult" style="display: none;">
                            <p id="resultTitle">チーム合計ホームラン数</p>
                            <div id="totalHrValue" class="total-hr">0本</div>
                        </div>
                    </div>
                </div>
                
                <div id="shareControls" class="share-btn-group" style="display: none; padding: 0 20px 20px 20px;">
                    <button id="saveImgBtn" class="action-btn btn-save">画像を保存</button>
                    <button id="copyImgBtn" class="action-btn btn-copy">画像をコピー</button>
                    <button id="retryBtn" class="action-btn btn-retry">もう一度遊ぶ</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=4"></script>
</body>
</html>
